<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perpustakaan Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 Perpustakaan Online</h1>
        
        <div id="authSection" class="card">
            <h3>Masuk Ke Akun</h3>
            <form id="loginForm">
                <input type="text" id="loginUser" placeholder="Username" required>
                <input type="password" id="loginPass" placeholder="Password" required>
                <button type="submit" style="background-color: #2ecc71;">Login</button>
            </form>
        </div>

        <div id="formMenejemenBuku" class="card" style="display: none;">
            <h3>Tambah Buku Baru</h3>
            <form id="formBuku">
                <input type="text" id="judul" placeholder="Judul Buku" required>
                <input type="text" id="penulis" placeholder="Penulis" required>
                <button type="submit">Tambah Buku</button>
            </form>
        </div>

        <h2>Daftar Koleksi Buku</h2>
        <div id="daftarBuku" class="grid-buku"></div>
    </div>

    <script>
        alert("Script Perpus Berhasil Dimuat!");
        let userLoggedIn = false;

        // 1. Cek Status Login
        async function cekStatusAuth() {
            // Jika dibuka di GitHub Pages, abaikan pengecekan session auth backend
            if (window.location.hostname.includes('github.io')) {
                fetchBuku();
                return;
            }

            try {
                const res = await fetch('/api/auth/status');
                const data = await res.json();
                const authSection = document.getElementById('authSection');
                const formMenejemenBuku = document.getElementById('formMenejemenBuku');

                if (data.isLoggedIn) {
                    userLoggedIn = true;
                    formMenejemenBuku.style.display = 'block';
                    authSection.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center; width:100%;">
                            <p>Halo, <strong>${data.user.username}</strong>! Anda masuk sebagai Admin.</p>
                            <button id="btnLogout" style="background-color: #e74c3c;">Logout</button>
                        </div>
                    `;
                    document.getElementById('btnLogout').addEventListener('click', logout);
                } else {
                    userLoggedIn = false;
                    formMenejemenBuku.style.display = 'none';
                    authSection.innerHTML = `
                        <h3>Masuk Ke Akun</h3>
                        <form id="loginForm" style="display:flex; gap:10px; width:100%;">
                            <input type="text" id="loginUser" placeholder="Username" required>
                            <input type="password" id="loginPass" placeholder="Password" required>
                            <button type="submit" style="background-color: #2ecc71;">Login</button>
                        </form>
                    `;
                    document.getElementById('loginForm').addEventListener('submit', login);
                }
            } catch (err) {
                console.error("Gagal terhubung ke server:", err);
            }
            fetchBuku();
        }

        // 2. Fungsi Login
        async function login(e) {
            e.preventDefault();
            const username = document.getElementById('loginUser').value;
            const password = document.getElementById('loginPass').value;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();
                
                if (res.ok) {
                    alert("Login Berhasil!");
                    cekStatusAuth();
                } else {
                    alert("Gagal Login: " + data.message);
                }
            } catch (error) {
                alert("Tidak bisa terhubung ke server backend.");
            }
        }

        // 3. Fungsi Logout
        async function logout() {
            await fetch('/api/auth/logout', { method: 'POST' });
            alert("Anda telah logout.");
            cekStatusAuth();
        }

        // 4. Ambil Daftar Buku (Mendukung Deteksi Otomatis Localhost vs GitHub Pages)
        async function fetchBuku() {
            const cardDaftarBuku = document.getElementById('daftarBuku');
            const isGitHubPages = window.location.hostname.includes('github.io');

            // Skenario A: Jika dibuka lewat link GitHub Pages Online (Tampilkan data dummy cadangan)
            if (isGitHubPages) {
                const bukuDummy = [
                    { id: 1, judul: "Laskar Pelangi (Demo)", penulis: "Andrea Hirata", dipinjam: false },
                    { id: 2, judul: "Bumi (Demo)", penulis: "Tere Liye", dipinjam: true },
                    { id: 3, judul: "Negeri 5 Menara (Demo)", penulis: "Ahmad Fuadi", dipinjam: false }
                ];
                tampilkanBukuKeLayar(bukuDummy);
                return; 
            }

            // Skenario B: Jika dibuka di Localhost (Ambil data real-time dari MySQL)
            try {
                const res = await fetch('/api/buku');
                const buku = await res.json();
                tampilkanBukuKeLayar(buku);
            } catch (err) {
                console.error("Gagal memuat buku:", err);
                cardDaftarBuku.innerHTML = '<p style="color:#e74c3c;">Gagal terhubung ke database MySQL lokal.</p>';
            }
        }

        // Fungsi Pembantu Render Kartu Buku ke Layar
        function tampilkanBukuKeLayar(daftarBuku) {
            const cardDaftarBuku = document.getElementById('daftarBuku');
            cardDaftarBuku.innerHTML = '';

            if (daftarBuku.length === 0) {
                cardDaftarBuku.innerHTML = '<p style="color:#7f8c8d;">Belum ada koleksi buku.</p>';
                return;
            }

            daftarBuku.forEach(b => {
                const item = document.createElement('div');
                item.className = `buku-card ${b.dipinjam ? 'dipinjam' : ''}`;
                
                const tombolAksi = userLoggedIn 
                    ? `<button onclick="toggleStatus(${b.id})">${b.dipinjam ? 'Kembalikan' : 'Pinjam Buku'}</button>`
                    : `<p style="font-size:12px; color:#95a5a6; font-style: italic;">Fitur database dinamis aktif di Localhost</p>`;

                item.innerHTML = `
                    <h4>${b.judul}</h4>
                    <p>Oleh: ${b.penulis}</p>
                    ${tombolAksi}
                `;
                cardDaftarBuku.appendChild(item);
            });
        }

        // 5. Tambah Buku Baru
        document.getElementById('formBuku').addEventListener('submit', async (e) => {
            e.preventDefault();
            const judul = document.getElementById('judul').value;
            const penulis = document.getElementById('penulis').value;

            try {
                const res = await fetch('/api/buku', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ judul, penulis })
                });

                if(res.ok) {
                    document.getElementById('formBuku').reset();
                    fetchBuku();
                } else {
                    const data = await res.json();
                    alert(data.message);
                }
            } catch (error) {
                alert("Gagal terhubung ke server untuk menambah buku.");
            }
        });

        // 6. Ubah Status Pinjam
        async function toggleStatus(id) {
            try {
                await fetch(`/api/buku/${id}/status`, { method: 'PATCH' });
                fetchBuku();
            } catch (error) {
                console.error("Gagal mengubah status buku:", error);
            }
        }

        // Jalankan otomatis saat halaman dimuat
        cekStatusAuth();
    </script>
</body>
</html>
